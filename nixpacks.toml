# Nixpacks configuration for Railway deployment
# Ensures system libraries needed by psycopg2, bcrypt, and cryptography are available.

[phases.setup]
nixPkgs = ["python311", "gcc", "libffi", "openssl", "postgresql"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
